<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Priorify</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div id="settingsPanel">
      <button id="settingsCloseBtn" title="Close">✕</button>
      <div id="settingsContent">
        <h3>Settings</h3>

        <p class="settings-label">I prefer:</p>
        <label class="radio-option">
          <input type="radio" name="priority" value="urgent"> Urgent tasks
        </label>
        <label class="radio-option">
          <input type="radio" name="priority" value="easy"> Easy wins
        </label>
        <label class="radio-option">
          <input type="radio" name="priority" value="balanced" checked> Balanced (default)
        </label>

        <p class="settings-label">Default session:</p>
        <label class="radio-option">
          <input type="radio" name="duration" value="600"> 10 min
        </label>
        <label class="radio-option">
          <input type="radio" name="duration" value="1500" checked> 25 min
        </label>
        <label class="radio-option">
          <input type="radio" name="duration" value="2700"> 45 min
        </label>
      </div>
    </div>

    <div class="container">
      <h1>Priorify</h1>
      <button id="settingsBtn" title="Settings">⚙</button>
      <div class="button-row">
        <div class="non-action">
          <button id="addBtn">+ Add Task</button>
        </div>
        <div class="action-col">
          <button id="prioritizeBtn">Prioritize</button>
        </div>
      </div>
    </div>

    <div id="recommendationBox">
      <div id="recHeader">
        <h2>Recommended</h2>
        <button id="explainBtn" title="Why this task?">?</button>
      </div>
      <p id="recommendationText">Click Prioritize to get a recommendation</p>
      <p id="recommendationMeta"></p>
      <p id="recommendationRationale"></p>
      <div id="recExplanation"></div>
      <button id="startBtn">▶ Start 25 min</button>
    </div>

    <div id="tasksContainer">
      <!-- Tasks are dynamically inserted here -->
      <div id="inProgress">
        <h2>In Progress</h2>
        <p>No tasks yet.</p>
      </div>
      <div id="completed">
        <h2>Completed</h2>
        <p>Nothing here yet.</p>
      </div>
    </div>

    <div id="checkInView">
      <p id="checkInHeading">Nice — did you make progress?</p>
      <div class="checkin-buttons">
        <button id="checkInYes">✔ Yes</button>
        <button id="checkInNo">✖ Not really</button>
      </div>
      <button id="markDoneBtn">Mark as done ✓</button>
    </div>

    <div id="checkInYesView">
      <p id="checkInYesHeading">Great — keep going or pick next?</p>
      <div class="checkin-buttons">
        <button id="continueBtn">Continue (25 min)</button>
        <button id="newRecBtn">New recommendation</button>
      </div>
    </div>

    <div id="checkInNoView">
      <p id="checkInNoHeading">No problem — try a smaller step?</p>
      <div class="checkin-buttons">
        <button id="tryShortBtn">Try 10 min</button>
        <button id="suggestOtherBtn">Suggest another</button>
      </div>
    </div>

    <div id="timerView">
      <p id="timerLabel">Working on:</p>
      <p id="timerTaskName"></p>
      <div id="timerDisplay">25:00</div>
      <div class="timer-buttons">
        <button id="pauseBtn">⏸ Pause</button>
        <button id="giveUpBtn">⏹ Give Up</button>
      </div>
    </div>

    <div id="undoToast">
      <span id="undoToastMsg"></span>
      <button id="undoBtn">Undo</button>
    </div>

    <script src="scoring.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
