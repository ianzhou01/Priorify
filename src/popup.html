<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Priorify</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="container">
      <h1>Priorify</h1>
      <div class="button-row">
        <div class="non-action">
          <button id="addBtn">+ Add Task</button>
        </div>
        <div class="action-col">
          <button id="prioritizeBtn">Prioritize</button>
        </div>
      </div>
    </div>

    <div id="recommendationBox">
      <h2>Recommended</h2>
      <p id="recommendationText">Click Prioritize to get a recommendation</p>
      <p id="recommendationMeta"></p>
      <p id="recommendationRationale"></p>
      <button id="startBtn">▶ Start 25 min</button>
    </div>

    <div id="tasksContainer">
      <!-- Tasks will be dynamically inserted here -->
      <div id="inProgress">
        <h2>In Progress</h2>
        <p>No tasks yet.</p>
      </div>
      <div id="completed">
        <h2>Completed</h2>
        <p>Nothing here yet.</p>
      </div>
    </div>

    <div id="timerView">
      <p id="timerLabel">Working on:</p>
      <p id="timerTaskName"></p>
      <div id="timerDisplay">25:00</div>
      <div class="timer-buttons">
        <button id="pauseBtn">⏸ Pause</button>
        <button id="giveUpBtn">⏹ Give Up</button>
      </div>
    </div>

    <div id="undoToast">
      <span id="undoToastMsg"></span>
      <button id="undoBtn">Undo</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
