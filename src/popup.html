<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Priorify</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="container">
        <h1>Priorify</h1>
      <div class="button-row">
        <div class ="non-action">
          <button id="addBtn">Add</button>
        </div>
      <div class="action-col">
        <button id="prioritizeBtn">Prioritize</button>
        <p id="prioritizeHTML" class="underBtn">Choose your own algorithm</p>
        </div>
      </div>
    </div>


    <div id="tasksContainer">
      <!-- Tasks will be dynamically inserted here -->
      <div id="inProgress">
        <p>Tasks in progress will appear here.</p>
      </div>
      <div id="completed">
        <p>Completed tasks will appear here.</p>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
