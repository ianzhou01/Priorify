<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Priorify</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="container">
      <h1>Priorify</h1>
      <p>Your tasks, sorted.</p>
      <button id="addBtn">Add</button>
      <button id="prioritizeBtn">Prioritize</button>
    </div>

    <div id="tasksContainer">
      <!-- Tasks will be dynamically inserted here -->
       <div id="inProgress">
        <h2>In Progress</h2>
        <p>Tasks in progress will appear here.</p>
       </div>
       
       <div id="completed">
        <h2>Completed</h2>
        <p>Completed tasks will appear here.</p>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
