<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Priorify Algorithm</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="../lib/flatpickr.min.css">
    <script src="../lib/flatpickr.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Priorify</h1>
      <h2 style="margin-top: 0;" id="formHeading">New Task</h2>
    </div>
 
    <div id="taskFormContainer">
      <form id="taskForm">
        <label for="title">Task Name <span id="titleCounter" class="char-counter">0/60</span></label>
        <input type="text" id="title" placeholder="e.g. Finish report" maxlength="60" required />
 
        <label for="date">Due Date</label>
        <input type="date" id="date" required />

        <label for="time">Time Commitment</label>
        <select id="time" required>
          <option value="" disabled selected>Estimated time</option>
          <option value="15">15 minutes</option>
          <option value="30">30 minutes</option>
          <option value="60">1 hour</option>
          <option value="120">2 hours</option>
          <option value="240">4+ hours</option>
        </select>
 
        <label for="difficulty">Difficulty Level</label>
        <select id="difficulty" required>
          <option value="" disabled selected>Select difficulty</option>
          <option value="Hard">🔴 High</option>
          <option value="Medium">🟡 Medium</option>
          <option value="Easy">🟢 Low</option>
        </select>
 
        <label>Importance</label>
        <div id="starPicker" class="star-picker">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
          <input type="hidden" id="importance" value="3" />
        </div>

        <div class="form-buttons">
          <button type="submit" id="submitBtn">Add Task</button>
          <button type="button" id="cancelBtn">Cancel</button>
        </div>
      </form>
    </div>
    
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
