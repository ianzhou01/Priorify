<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Priorify Algorithm</title>
    <link rel="stylesheet" href="popup.css"> 
  </head>
  <body>
    <div class="container">
      <h1>Priorify</h1>
      <h2 style="margin-top: 0;">New Task</h2>
    </div>
 
    <div id="taskFormContainer">
      <form id="taskForm">
        <label for="name">Task Name</label>
        <input type="text" id="name" placeholder="e.g. Finish report" required />
 
        <label for="dueDate">Due Date</label>
        <input type="date" id="deadline" required />
 
        <label for="priority">Priority Level</label>
        <select id="priority" required>
          <option value="" disabled selected>Select priority</option>
          <option value="high">🔴 High</option>
          <option value="medium">🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
 
        <label for="length">Time Commitment</label>
        <select id="length" required>
          <option value="" disabled selected>Estimated time</option>
          <option value="15">15 minutes</option>
          <option value="30">30 minutes</option>
          <option value="60">1 hour</option>
          <option value="120">2 hours</option>
          <option value="240">4+ hours</option>
        </select>
 
        <div class="form-buttons">
          <button type="submit" id="submitBtn">Add Task</button>
          <button type="button" id="cancelBtn">Cancel</button>
        </div>
      </form>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
